<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI ChatBot - برنامج ذكاء اصطناعي</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #667eea;
            --primary-dark: #5568d3;
            --secondary: #764ba2;
            --accent: #f093fb;
            --success: #4facfe;
            --danger: #ff6b6b;
            --warning: #ffa502;
            --dark: #2d3748;
            --light: #f7fafc;
            --border: #e2e8f0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 15px;
            direction: rtl;
            position: relative;
            overflow: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 1px, transparent 1px);
            background-size: 50px 50px;
            animation: float 20s linear infinite;
            pointer-events: none;
        }

        @keyframes float {
            0% { transform: translate(0, 0); }
            100% { transform: translate(50px, 50px); }
        }

        .container {
            width: 100%;
            max-width: 850px;
            height: 92vh;
            background: white;
            border-radius: 30px;
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.25);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            animation: slideUp 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
            position: relative;
            z-index: 1;
            backdrop-filter: blur(10px);
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(50px) scale(0.95);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
            color: white;
            padding: 25px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
            position: relative;
            overflow: hidden;
        }

        .header::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.05'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
            opacity: 0.5;
        }

        .header-content {
            position: relative;
            z-index: 1;
        }

        .header-content h1 {
            font-size: 32px;
            margin-bottom: 8px;
            font-weight: 700;
            text-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .header-content h1 .bot-icon {
            display: inline-block;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .header-content p {
            font-size: 15px;
            opacity: 0.95;
            font-weight: 500;
        }

        .header-buttons {
            display: flex;
            gap: 12px;
            position: relative;
            z-index: 1;
        }

        #chatContainer {
            flex: 1;
            overflow-y: auto;
            padding: 30px;
            background: linear-gradient(180deg, #f8f9ff 0%, #f5f7ff 100%);
            scroll-behavior: smooth;
            position: relative;
        }

        #chatContainer::-webkit-scrollbar {
            width: 10px;
        }

        #chatContainer::-webkit-scrollbar-track {
            background: transparent;
        }

        #chatContainer::-webkit-scrollbar-thumb {
            background: linear-gradient(180deg, #667eea, #764ba2);
            border-radius: 10px;
            border: 3px solid transparent;
            background-clip: content-box;
        }

        #chatContainer::-webkit-scrollbar-thumb:hover {
            background: linear-gradient(180deg, #5568d3, #653a8a);
            background-clip: content-box;
        }

        .welcome-message {
            text-align: center;
            padding: 60px 30px;
            color: var(--dark);
            animation: fadeIn 0.8s ease-out;
        }

        .welcome-message h2 {
            font-size: 36px;
            margin-bottom: 20px;
            color: var(--dark);
            font-weight: 700;
        }

        .welcome-message p {
            font-size: 16px;
            margin: 12px 0;
            color: #666;
            font-weight: 500;
        }

        .welcome-message .emoji {
            display: inline-block;
            font-size: 48px;
            animation: float-emoji 3s ease-in-out infinite;
        }

        @keyframes float-emoji {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message {
            margin-bottom: 20px;
            animation: messageSlide 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            display: flex;
            align-items: flex-end;
            gap: 12px;
        }

        @keyframes messageSlide {
            from {
                opacity: 0;
                transform: translateY(15px) scale(0.95);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .message.user {
            justify-content: flex-end;
        }

        .message.user .message-content {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 20px 20px 5px 20px;
            max-width: 75%;
            padding: 14px 18px;
            word-wrap: break-word;
            box-shadow: 0 8px 24px rgba(102, 126, 234, 0.35);
            font-weight: 500;
            position: relative;
        }

        .message.user .message-content::after {
            content: '';
            position: absolute;
            bottom: -8px;
            left: -8px;
            width: 20px;
            height: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 50%;
            opacity: 0.3;
        }

        .message.bot {
            justify-content: flex-start;
        }

        .message.bot .message-content {
            background: white;
            color: var(--dark);
            border: 2px solid #e8f0fe;
            border-radius: 20px 20px 20px 5px;
            max-width: 75%;
            padding: 14px 18px;
            word-wrap: break-word;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
            font-weight: 500;
            position: relative;
        }

        .message.bot .message-content::before {
            content: '🤖';
            margin-left: 8px;
            display: inline-block;
            animation: robotWave 1s ease-in-out infinite;
        }

        @keyframes robotWave {
            0%, 100% { transform: rotate(0deg); }
            25% { transform: rotate(15deg); }
            75% { transform: rotate(-15deg); }
        }

        .message-time {
            font-size: 12px;
            color: #999;
            margin-top: 4px;
            font-weight: 500;
        }

        .input-area {
            display: flex;
            gap: 12px;
            padding: 25px 30px;
            background: white;
            border-top: 2px solid #f0f0f0;
            align-items: center;
        }

        .input-field {
            flex: 1;
            padding: 14px 18px;
            border: 2px solid #e8f0fe;
            border-radius: 25px;
            font-size: 15px;
            outline: none;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            font-family: inherit;
            font-weight: 500;
            background: #f8f9ff;
        }

        .input-field:focus {
            border-color: #667eea;
            background: white;
            box-shadow: 0 0 20px rgba(102, 126, 234, 0.25);
            transform: translateY(-2px);
        }

        .input-field::placeholder {
            color: #b0b0b0;
        }

        .btn {
            padding: 13px 24px;
            border: none;
            border-radius: 25px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            display: flex;
            align-items: center;
            gap: 8px;
            white-space: nowrap;
            font-family: inherit;
            position: relative;
            overflow: hidden;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        .btn:hover::before {
            width: 300px;
            height: 300px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            box-shadow: 0 8px 24px rgba(102, 126, 234, 0.35);
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 32px rgba(102, 126, 234, 0.45);
        }

        .btn-primary:active {
            transform: translateY(-1px);
        }

        .btn-danger {
            background: linear-gradient(135deg, #ff6b6b 0%, #ff5252 100%);
            color: white;
            font-size: 14px;
            padding: 11px 16px;
            box-shadow: 0 6px 16px rgba(255, 107, 107, 0.3);
        }

        .btn-danger:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(255, 107, 107, 0.4);
        }

        .btn-info {
            background: linear-gradient(135deg, #4dabf7 0%, #339af0 100%);
            color: white;
            font-size: 14px;
            padding: 11px 16px;
            box-shadow: 0 6px 16px rgba(77, 171, 247, 0.3);
        }

        .btn-info:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(77, 171, 247, 0.4);
        }

        .footer {
            background: linear-gradient(180deg, #f8f9ff 0%, #f5f7ff 100%);
            border-top: 2px solid #e8f0fe;
            padding: 16px 30px;
            text-align: center;
            font-size: 13px;
            color: #666;
            font-weight: 500;
        }

        .footer a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s;
        }

        .footer a:hover {
            color: #764ba2;
            text-decoration: underline;
        }

        .typing {
            display: flex;
            gap: 6px;
            align-items: center;
            padding: 8px 12px;
        }

        .typing span {
            width: 10px;
            height: 10px;
            background: #667eea;
            border-radius: 50%;
            animation: typingBounce 1.4s infinite;
        }

        .typing span:nth-child(2) {
            animation-delay: 0.2s;
        }

        .typing span:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes typingBounce {
            0%, 60%, 100% {
                opacity: 0.5;
                transform: translateY(0);
            }
            30% {
                opacity: 1;
                transform: translateY(-12px);
            }
        }

        @media (max-width: 700px) {
            .container {
                height: 100vh;
                max-width: 100%;
                border-radius: 0;
            }

            .header {
                padding: 20px;
                flex-direction: column;
                align-items: flex-start;
            }

            .header-content h1 {
                font-size: 26px;
            }

            .header-buttons {
                width: 100%;
                justify-content: space-between;
            }

            .message.user .message-content,
            .message.bot .message-content {
                max-width: 85%;
            }

            .input-area {
                flex-direction: column;
                gap: 10px;
            }

            .btn {
                width: 100%;
                justify-content: center;
            }

            #chatContainer {
                padding: 20px;
            }

            .input-area {
                padding: 15px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <div class="header-content">
                <h1><span class="bot-icon">🤖</span> AI ChatBot</h1>
                <p>✨ برنامج ذكاء اصطناعي ذكي للمحادثة</p>
            </div>
            <div class="header-buttons">
                <button id="clearBtn" class="btn btn-danger" title="مسح السجل">
                    <i class="fas fa-trash"></i> مسح
                </button>
                <button id="downloadBtn" class="btn btn-info" title="تحميل المحادثة">
                    <i class="fas fa-download"></i> تحميل
                </button>
            </div>
        </div>

        <!-- Chat Container -->
        <div id="chatContainer">
            <div class="welcome-message">
                <div class="emoji">👋</div>
                <h2>مرحباً بك!</h2>
                <p>أنا ChatBot الذكي 🤖</p>
                <p style="color: #999; font-size: 14px;">برنامج ذكاء اصطناعي هنا لمساعدتك في أي وقت</p>
                <p style="font-size: 12px; color: #bbb; margin-top: 20px;">💬 ابدأ المحادثة معي الآن</p>
            </div>
        </div>

        <!-- Input Area -->
        <div class="input-area">
            <input 
                type="text" 
                id="userInput" 
                placeholder="🔤 اكتب رسالتك هنا..." 
                class="input-field"
                autocomplete="off"
            >
            <button id="sendBtn" class="btn btn-primary" title="إرسال">
                <i class="fas fa-paper-plane"></i> إرسال
            </button>
        </div>

        <!-- Footer -->
        <div class="footer">
            <p>✨ تم إنشاؤه بواسطة <strong>ramo226a</strong> | 
            <a href="https://github.com/ramo226a/AI-ChatBot" target="_blank">
                <i class="fab fa-github"></i> GitHub
            </a></p>
        </div>
    </div>

    <script>
        const knowledgeBase = {
            'hello': 'مرحبا! كيف حالك؟ كيف يمكنني مساعدتك اليوم؟ 😊',
            'hi': 'أهلا وسهلا! ما الذي يمكنني مساعدتك فيه؟ 👋',
            'how are you': 'أنا بخير، شكراً لسؤالك! كيف أنت؟ 😄',
            'what is your name': 'أنا ChatBot الذكي، برنامج ذكاء اصطناعي هنا لمساعدتك! 🤖',
            'thank you': 'يسعدني أن أكون مفيداً! هل هناك شيء آخر تحتاجه؟ 💫',
            'thanks': 'شكراً لاستخدام البرنامج! هل تحتاج لشيء آخر؟ 🙏',
            'bye': 'وداعاً! أتمنى أن تكون قد استفدت. إلى اللقاء! 👋',
            'goodbye': 'شكراً على المحادثة! أراك قريباً! 🌟',
            'help': 'يمكنني مساعدتك في الإجابة على الأسئلة والمحادثة. جرب أن تسأل عن أي موضوع! 📚',
            'who are you': 'أنا برنامج ذكاء اصطناعي متقدم مصمم للمحادثة والمساعدة! 🚀',
            'مرحبا': 'مرحبا! كيف حالك؟ كيف يمكنني مساعدتك؟ 😊',
            'السلام عليكم': 'وعليكم السلام ورحمة الله وبركاته! كيف حالك؟ 👋',
            'كيف حالك': 'أنا بخير، شكراً لسؤالك! وأنت كيف حالك؟ 😄',
            'من أنت': 'أنا ChatBot الذكي، برنامج ذكاء اصطناعي هنا لمساعدتك! 🤖',
            'شكراً': 'يسعدني أن أكون مفيداً! هل هناك شيء آخر؟ 💫',
            'شكرا': 'العفو! هل تحتاج لشيء آخر؟ 🙏',
            'وداعاً': 'وداعاً! كان سعيداً بمحادثتك معي 👋 🌟',
            'ساعدني': 'بكل سرور! ما الذي تحتاج مساعدة فيه؟ 💪',
        };

        const questionResponses = {
            'كيف': 'هذا سؤال جيد! 🤔 أنا أعمل على فهم هذا بشكل أفضل. هل يمكنك توضيح أكثر؟',
            'ماذا': 'أنا أحاول فهم ما تقصده. يمكنك إعطائي مزيداً من التفاصيل؟ 📝',
            'لماذا': 'هذا سؤال عميق! 🧠 دعني أفكر في الإجابة... هل لديك أي معلومات إضافية؟',
            'متى': 'هذا يعتمد على عوامل كثيرة. هل يمكنك توضيح السياق أكثر؟ ⏰',
            'أين': 'هذا موضوع مثير للاهتمام! 🗺️ هل يمكنك إعطائي مزيد من التفاصيل؟',
        };

        const chatContainer = document.getElementById('chatContainer');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');
        const clearBtn = document.getElementById('clearBtn');
        const downloadBtn = document.getElementById('downloadBtn');

        let conversations = JSON.parse(localStorage.getItem('chatHistory')) || [];

        function loadConversations() {
            conversations.forEach(msg => {
                addMessage(msg.text, msg.type, true);
            });
            scrollToBottom();
        }

        function addMessage(text, sender, isLoad = false) {
            const messageDiv = document.createElement('div');
            messageDiv.classList.add('message', sender);

            const messageContent = document.createElement('div');
            messageContent.classList.add('message-content');
            messageContent.textContent = text;

            messageDiv.appendChild(messageContent);

            const timeDiv = document.createElement('div');
            timeDiv.classList.add('message-time');
            timeDiv.textContent = new Date().toLocaleTimeString('ar-SA', {
                hour: '2-digit',
                minute: '2-digit'
            });
            messageDiv.appendChild(timeDiv);

            if (chatContainer.querySelector('.welcome-message')) {
                chatContainer.innerHTML = '';
            }

            chatContainer.appendChild(messageDiv);
            scrollToBottom();

            if (!isLoad) {
                conversations.push({ type: sender, text: text });
                localStorage.setItem('chatHistory', JSON.stringify(conversations));
            }
        }

        function showTyping() {
            const messageDiv = document.createElement('div');
            messageDiv.classList.add('message', 'bot');
            messageDiv.id = 'typingIndicator';

            const messageContent = document.createElement('div');
            messageContent.classList.add('message-content', 'typing');
            messageContent.innerHTML = '<span></span><span></span><span></span>';

            messageDiv.appendChild(messageContent);
            chatContainer.appendChild(messageDiv);
            scrollToBottom();
        }

        function removeTyping() {
            const typing = document.getElementById('typingIndicator');
            if (typing) typing.remove();
        }

        function processInput(text) {
            return text.toLowerCase().trim().replace(/[.,!?;:]/g, '');
        }

        function extractKeywords(text) {
            const words = processInput(text).split(' ');
            return words.filter(word => word.length > 3);
        }

        function calculateSimilarity(text1, text2) {
            const tokens1 = processInput(text1).split(' ');
            const tokens2 = processInput(text2).split(' ');

            let commonWords = 0;
            tokens1.forEach(t1 => {
                if (tokens2.includes(t1)) commonWords++;
            });

            const maxSize = Math.max(tokens1.length, tokens2.length);
            return maxSize === 0 ? 0 : commonWords / maxSize;
        }

        function findBestMatch(input) {
            let maxSimilarity = 0;
            let bestMatch = null;

            for (let key in knowledgeBase) {
                const similarity = calculateSimilarity(input, key);
                if (similarity > maxSimilarity && similarity > 0.5) {
                    maxSimilarity = similarity;
                    bestMatch = knowledgeBase[key];
                }
            }

            return bestMatch;
        }

        function generateResponse(input) {
            const processed = processInput(input);

            if (knowledgeBase[processed]) {
                return knowledgeBase[processed];
            }

            for (let word in questionResponses) {
                if (processed.includes(word)) {
                    return questionResponses[word];
                }
            }

            const bestMatch = findBestMatch(input);
            if (bestMatch) return bestMatch;

            const keywords = extractKeywords(input);
            if (keywords.length > 0) {
                return `أنا أفهم أنك تتحدث عن "${keywords[0]}". 🤔 هذا موضوع مثير للاهتمام! قل لي المزيد. 💡`;
            }

            const defaultResponses = [
                'هذا تعليق مثير للاهتمام! 👏 هل يمكنك توضيح أكثر؟',
                'أنا أحاول فهم ما تقصده. 🤔 يمكنك إعطائي مزيداً من التفاصيل؟',
                'هذا فكرة جيدة! 💡 خبرني أكثر عن هذا.',
                'أنا متأكد أن هذا مهم لك. 📌 هل يمكنك توضيح أكثر؟',
                'سؤال رائع! ⭐ دعني أفكر في الأمر... ما رأيك؟'
            ];

            return defaultResponses[Math.floor(Math.random() * defaultResponses.length)];
        }

        function sendMessage() {
            const message = userInput.value.trim();

            if (!message) return;

            addMessage(message, 'user');
            userInput.value = '';
            userInput.focus();

            showTyping();

            setTimeout(() => {
                removeTyping();
                const response = generateResponse(message);
                addMessage(response, 'bot');
            }, 800 + Math.random() * 400);
        }

        function clearChat() {
            if (confirm('هل تريد فعلاً مسح جميع المحادثات؟')) {
                chatContainer.innerHTML = `
                    <div class="welcome-message">
                        <div class="emoji">👋</div>
                        <h2>مرحباً بك!</h2>
                        <p>أنا ChatBot الذكي 🤖</p>
                        <p style="color: #999; font-size: 14px;">برنامج ذكاء اصطناعي هنا لمساعدتك في أي وقت</p>
                        <p style="font-size: 12px; color: #bbb; margin-top: 20px;">💬 ابدأ المحادثة معي الآن</p>
                    </div>
                `;
                conversations = [];
                localStorage.removeItem('chatHistory');
                scrollToBottom();
            }
        }

        function downloadChat() {
            let content = '═══════════════════════════════════════\n';
            content += '        📱 سجل المحادثات - AI ChatBot\n';
            content += '═══════════════════════════════════════\n\n';

            conversations.forEach((msg, index) => {
                const sender = msg.type === 'user' ? '👤 أنت' : '🤖 البرنامج';
                content += `[${index + 1}] ${sender}:\n`;
                content += `    ${msg.text}\n\n`;
            });

            content += '═══════════════════════════════════════\n';
            content += `⏰ تم الحفظ في: ${new Date().toLocaleString('ar-SA')}\n`;
            content += `📊 عدد الرسائل: ${conversations.length}\n`;
            content += '═══════════════════════════════════════\n';

            const blob = new Blob([content], { type: 'text/plain;charset=utf-8' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = `chatbot-${new Date().toISOString().split('T')[0]}.txt`;
            link.click();
        }

        function scrollToBottom() {
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        sendBtn.addEventListener('click', sendMessage);
        userInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });

        clearBtn.addEventListener('click', clearChat);
        downloadBtn.addEventListener('click', downloadChat);

        window.addEventListener('load', () => {
            if (conversations.length > 0) {
                loadConversations();
            } else {
                scrollToBottom();
            }
        });

        userInput.focus();
    </script>
</body>
</html>
