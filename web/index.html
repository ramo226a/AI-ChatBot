<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI ChatBot - برنامج ذكاء اصطناعي</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <div class="header-content">
                <h1>🤖 AI ChatBot</h1>
                <p>برنامج ذكاء اصطناعي ذكي للمحادثة</p>
            </div>
            <div class="header-buttons">
                <button id="clearBtn" class="btn btn-danger" title="مسح السجل">🗑️ مسح</button>
                <button id="downloadBtn" class="btn btn-info" title="تحميل المحادثة">⬇️ تحميل</button>
            </div>
        </div>

        <!-- Chat Container -->
        <div class="chat-container" id="chatContainer">
            <div class="welcome-message">
                <h2>👋 مرحباً بك!</h2>
                <p>أنا ChatBot الذكي، برنامج ذكاء اصطناعي هنا لمساعدتك</p>
                <p style="font-size: 12px; color: #888; margin-top: 10px;">ابدأ المحادثة معي الآن 💬</p>
            </div>
        </div>

        <!-- Input Area -->
        <div class="input-area">
            <input 
                type="text" 
                id="userInput" 
                placeholder="اكتب رسالتك هنا..." 
                class="input-field"
                autocomplete="off"
            >
            <button id="sendBtn" class="btn btn-primary" title="إرسال">
                ▶️ إرسال
            </button>
        </div>

        <!-- Footer -->
        <div class="footer">
            <p>تم إنشاؤه بواسطة: <strong>ramo226a</strong> | 
            <a href="https://github.com/ramo226a/AI-ChatBot" target="_blank">GitHub</a>
            </p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
